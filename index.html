<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caza Limones</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fuente retro -->
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="limones.css">
</head>

<body onload="iniciar()">

<div class="contenedor">

    <h1>ATRAPAR LIMONES</h1>

    <p class="frase">
        Si del cielo te caen limones,<br>
        te hará falta un encebollado.
    </p>

    <div class="juego">

    <canvas id="areaJuego" width="500" height="300"></canvas>

    <div class="panel">

        <div class="card">
            <span class="tituloCard">PUNTAJE</span>
            <span id="txtPuntaje">0</span>
        </div>

        <div class="card">
            <span class="tituloCard">VIDAS</span>
            <span id="txtVidas">3</span>
        </div>

    </div>

</div>

    <div class="botones">

        <div class="movimiento">

            <button onclick="moverIzquierda()">
                ◀ IZQUIERDA
            </button>

            <button onclick="moverDerecha()">
                DERECHA ▶
            </button>

        </div>

        <button class="reiniciar" onclick="reiniciar()">
            REINICIAR
        </button>

    </div>

    <h2>Autor: Andrade Javier</h2>

</div>

<script src="limones.js"></script>

</body>
</html>
